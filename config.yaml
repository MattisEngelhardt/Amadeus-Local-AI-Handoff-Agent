# Amadeus local configuration

hotkey: "ctrl+space"
output_dir: "./output"

models:
  llm_provider: "ollama"
  ollama_base_url: "http://localhost:11434"
  base_model: "gemma4:e4b"
  ollama_model: "amadeus"
  whisper_mode: "local"
  whisper_local_model: "large-v3"
  transcription_language: "de"

audio:
  samplerate: 16000
  channels: 1
  temp_filename: "temp_recording.wav"

quality_criteria:
  - "Preserve raw user input separately from cleaned text and compiled prompts"
  - "Keep generated workspace file and folder names in English"
  - "Do not invent missing sources, constraints, or user intent"
  - "Block or document assumptions when context is incomplete"
  - "Generate CLAUDE.md and AGENTS.md as the primary handoff instructions"
